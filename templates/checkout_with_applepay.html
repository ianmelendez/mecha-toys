<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - Mecha Toys</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    
    <!-- PayPal SDK with Apple Pay and Google Pay -->
    <script src="https://www.paypal.com/sdk/js?client-id={{ client_id }}&currency=EUR&components=applepay,googlepay&intent=capture">
    </script>
    
    <!-- Apple Pay JS SDK -->
    <script src="https://applepay.cdn-apple.com/jsapi/1.latest/apple-pay-sdk.js">
    </script>
    
    <!-- Google Pay JS SDK -->
    <script src="https://pay.google.com/gp/p/js/pay.js" async>
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .checkout-container {
            max-width: 650px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            padding: 40px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2rem; font-weight: 800; color: #1a1a2e; margin-bottom: 6px; }
        .header p { color: #636e72; font-size: 1rem; }

        .product-summary {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #e9ecef;
        }

        .product-summary .label { font-size: 0.85rem; color: #636e72; font-weight: 600; text-transform: uppercase; }
        .product-summary .name { font-size: 1.2rem; font-weight: 700; color: #1a1a2e; margin: 4px 0; }
        .product-summary .price { font-size: 1.8rem; font-weight: 800; color: #e17055; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; font-size: 0.9rem; color: #1a1a2e; margin-bottom: 6px; }
        .form-group label .required { color: #e17055; }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: white;
            color: #1a1a2e;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #6c5ce7;
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.1);
        }

        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        .payment-section {
            margin-top: 25px;
            border-top: 2px solid #e9ecef;
            padding-top: 25px;
        }

        .payment-section .label {
            font-size: 0.85rem;
            color: #636e72;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 15px;
            text-align: center;
        }

        .payment-buttons { display: flex; flex-direction: column; gap: 12px; }

        #applepay-container {
            width: 100%;
            min-height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #applepay-container apple-pay-button {
            width: 100%;
            max-width: 400px;
            height: 50px;
        }

        #googlepay-container {
            width: 100%;
            min-height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .google-pay-button-wrapper {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: center;
        }

        .paypal-btn-wrapper { margin-top: 10px; }

        .paypal-btn-wrapper .btn-paypal {
            width: 100%;
            padding: 16px;
            background: #0070ba;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 112, 186, 0.3);
        }

        .paypal-btn-wrapper .btn-paypal:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 112, 186, 0.4);
        }

        .paypal-btn-wrapper .btn-paypal:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .loading { display: none; text-align: center; padding: 20px; }
        .loading.active { display: block; }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0070ba;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .trust-badges {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .trust-badges span { font-size: 0.85rem; color: #636e72; font-weight: 500; }
        .back-link { display: block; text-align: center; margin-top: 16px; color: #636e72; text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: #1a1a2e; }

        .divider {
            display: flex;
            align-items: center;
            margin: 15px 0;
            color: #b2bec3;
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e9ecef;
        }

        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }

        .payment-message {
            text-align: center;
            color: #b2bec3;
            font-size: 0.9rem;
            padding: 10px;
        }

        @media (max-width: 600px) {
            .checkout-container { padding: 24px; }
            .form-row { grid-template-columns: 1fr; gap: 0; }
            .header h1 { font-size: 1.6rem; }
            .product-summary .price { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="checkout-container">
        <div class="header">
            <h1>🛒 Checkout</h1>
            <p>Complete your purchase securely</p>
        </div>

        <div class="product-summary">
            <div class="label">Your Order</div>
            <div class="name">{{ product.name }}</div>
            <div class="price">€{{ "%.2f"|format(product.price) }}</div>
        </div>

        <form id="checkout-form" method="POST" action="/checkout/{{ product.id }}">
            <div class="form-group">
                <label for="name">Full Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" placeholder="John Doe" required />
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required />
                </div>
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone" placeholder="+34 600 000 000" />
                </div>
            </div>

            <div class="form-group">
                <label for="address">Shipping Address <span class="required">*</span></label>
                <textarea id="address" name="address" placeholder="Street, City, Postal Code, Country" required></textarea>
            </div>

            <div class="payment-section">
                <span class="label">💳 Payment Methods</span>
                
                <div class="payment-buttons">
                    <!-- APPLE PAY -->
                    <div id="applepay-container">
                        <div class="payment-message">🍎 Checking Apple Pay...</div>
                    </div>

                    <!-- GOOGLE PAY -->
                    <div id="googlepay-container">
                        <div class="payment-message">🤖 Checking Google Pay...</div>
                    </div>

                    <div class="divider">or pay with PayPal</div>

                    <!-- PAYPAL STANDARD -->
                    <div class="paypal-btn-wrapper">
                        <button type="submit" class="btn-paypal" id="paypal-btn">
                            💳 Pay with PayPal
                        </button>
                    </div>
                </div>

                <div class="loading" id="loading-indicator">
                    <div class="spinner"></div>
                    <p style="color: #636e72;">Processing your payment...</p>
                </div>
            </div>
        </form>

        <div class="trust-badges">
            <span>🔒 Secure Payment</span>
            <span>🛡️ Buyer Protection</span>
            <span>📦 Fast Shipping</span>
        </div>

        <a href="/" class="back-link">← Back to Store</a>
    </div>

    <script>
        // ============================================
        // VARIABLES
        // ============================================
        var productId = "{{ product.id }}";
        var productName = "{{ product.name }}";
        var productPrice = parseFloat("{{ product.price }}");
        var clientId = "{{ client_id }}";

        console.log('=== CHECKOUT LOADED ===');
        console.log('Product:', productName, '€' + productPrice);

        // ============================================
        // GET CUSTOMER DATA
        // ============================================
        function getCustomerData() {
            var name = document.getElementById('name').value.trim();
            var email = document.getElementById('email').value.trim();
            var phone = document.getElementById('phone').value.trim();
            var address = document.getElementById('address').value.trim();
            
            if (!name || !email || !address) {
                alert('Please fill in all required fields.');
                return null;
            }
            
            return { name: name, email: email, phone: phone, address: address };
        }

        function showLoading() {
            document.getElementById('loading-indicator').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loading-indicator').classList.remove('active');
        }

        // ============================================
        // APPLE PAY SETUP
        // ============================================
        function setupApplePay() {
            var container = document.getElementById('applepay-container');
            var message = container.querySelector('.payment-message');
            
            console.log('=== SETUP APPLE PAY ===');
            
            if (typeof paypal === 'undefined') {
                console.log('❌ PayPal SDK not loaded');
                message.textContent = '🍎 Apple Pay not available';
                return;
            }
            
            if (typeof ApplePaySession === 'undefined' || !ApplePaySession.canMakePayments()) {
                console.log('❌ Apple Pay not available on this device');
                message.textContent = '🍎 Apple Pay not available';
                return;
            }
            
            console.log('✅ Apple Pay is available!');
            
            var applepay = paypal.Applepay();
            
            applepay.config()
                .then(function(config) {
                    console.log('Apple Pay config:', config);
                    
                    if (config.isEligible) {
                        console.log('✅ Merchant is eligible for Apple Pay!');
                        message.textContent = '';
                        
                        var button = document.createElement('apple-pay-button');
                        button.setAttribute('buttonstyle', 'black');
                        button.setAttribute('type', 'buy');
                        button.setAttribute('locale', 'en');
                        button.style.width = '100%';
                        button.style.maxWidth = '400px';
                        button.style.height = '50px';
                        button.style.borderRadius = '12px';
                        
                        container.innerHTML = '';
                        container.appendChild(button);
                        
                        button.addEventListener('click', function() {
                            console.log('🍎 Apple Pay button clicked!');
                            startApplePaySession(config);
                        });
                        
                    } else {
                        console.log('❌ Merchant not eligible for Apple Pay');
                        message.textContent = '🍎 Apple Pay not available';
                    }
                })
                .catch(function(error) {
                    console.error('Apple Pay config error:', error);
                    message.textContent = '🍎 Apple Pay error';
                });
        }

        // ============================================
        // START APPLE PAY SESSION
        // ============================================
        function startApplePaySession(config) {
            console.log('=== START APPLE PAY SESSION ===');
            
            var customerData = getCustomerData();
            if (!customerData) {
                alert('Please fill in your shipping details first.');
                return;
            }
            
            var paymentRequest = {
                countryCode: config.countryCode || 'ES',
                merchantCapabilities: config.merchantCapabilities || ['supports3DS'],
                supportedNetworks: config.supportedNetworks || ['visa', 'mastercard', 'amex', 'discover'],
                currencyCode: 'EUR',
                requiredShippingContactFields: ['name', 'phone', 'email', 'postalAddress'],
                requiredBillingContactFields: ['postalAddress'],
                total: {
                    label: 'Mecha Toys - ' + productName,
                    type: 'final',
                    amount: productPrice.toFixed(2)
                }
            };
            
            console.log('Payment Request:', paymentRequest);
            
            var session = new ApplePaySession(4, paymentRequest);
            
            session.onvalidatemerchant = function(event) {
                console.log('🔐 Validating merchant...');
                var applepay = paypal.Applepay();
                
                applepay.validateMerchant({
                    validationUrl: event.validationURL,
                    displayName: 'Mecha Toys'
                })
                .then(function(result) {
                    console.log('✅ Merchant validated!');
                    session.completeMerchantValidation(result.merchantSession);
                })
                .catch(function(error) {
                    console.error('Merchant validation failed:', error);
                    session.abort();
                });
            };
            
            session.onpaymentauthorized = function(event) {
                console.log('💰 Payment authorized by user');
                
                showLoading();
                
                fetch('/create-apple-pay-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        product_id: productId,
                        customer_name: customerData.name,
                        customer_email: customerData.email,
                        customer_phone: customerData.phone,
                        customer_address: customerData.address
                    })
                })
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.error) {
                        console.error('Order creation failed:', data.error);
                        session.completePayment(ApplePaySession.STATUS_FAILURE);
                        hideLoading();
                        return;
                    }
                    
                    var orderId = data.order_id;
                    console.log('✅ Order created:', orderId);
                    
                    var applepay = paypal.Applepay();
                    
                    applepay.confirmOrder({
                        orderId: orderId,
                        token: event.payment.token,
                        billingContact: event.payment.billingContact
                    })
                    .then(function(confirmResult) {
                        console.log('✅ Order confirmed with Apple Pay token');
                        session.completePayment(ApplePaySession.STATUS_SUCCESS);
                        
                        return fetch('/capture-apple-pay-order', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ order_id: orderId })
                        });
                    })
                    .then(function(response) { return response.json(); })
                    .then(function(captureData) {
                        if (captureData.success) {
                            console.log('✅ Payment captured successfully!');
                            window.location.href = '/orders';
                        } else {
                            console.error('Payment capture failed:', captureData.error);
                            alert('Payment was authorized but capture failed. Please contact support.');
                        }
                        hideLoading();
                    })
                    .catch(function(error) {
                        console.error('Confirmation failed:', error);
                        session.completePayment(ApplePaySession.STATUS_FAILURE);
                        hideLoading();
                    });
                })
                .catch(function(error) {
                    console.error('Error:', error);
                    session.completePayment(ApplePaySession.STATUS_FAILURE);
                    hideLoading();
                });
            };
            
            session.begin();
            console.log('✅ Apple Pay session started!');
        }

        // ============================================
        // GOOGLE PAY SETUP - FOLLOWING PAYPAL DOCS
        // ============================================
        function setupGooglePay() {
            var container = document.getElementById('googlepay-container');
            var message = container.querySelector('.payment-message');
            
            console.log('=== SETUP GOOGLE PAY ===');
            
            // Check if PayPal SDK is loaded
            if (typeof paypal === 'undefined') {
                console.log('❌ PayPal SDK not loaded');
                message.textContent = '🤖 Google Pay not available';
                return;
            }
            
            // Check if Google Pay is available in the SDK
            if (typeof paypal.Googlepay === 'undefined') {
                console.log('❌ Google Pay not available in SDK');
                message.textContent = '🤖 Google Pay not available';
                return;
            }
            
            console.log('✅ PayPal SDK loaded with Google Pay');
            
            // Check if Google Pay SDK is loaded
            if (typeof google === 'undefined' || typeof google.payments === 'undefined') {
                console.log('❌ Google Pay SDK not loaded (waiting...)');
                message.textContent = '🤖 Loading Google Pay...';
                return;  // Will retry
            }
            
            console.log('✅ Google Pay SDK loaded!');
            
            // Get Google Pay configuration from PayPal
            var googlepay = paypal.Googlepay();
            
            googlepay.config()
                .then(function(config) {
                    console.log('Google Pay config:', config);
                    
                    // Create PaymentDataRequest for Google Pay
                    var paymentDataRequest = {
                        apiVersion: 2,
                        apiVersionMinor: 0,
                        allowedPaymentMethods: config.allowedPaymentMethods || [{
                            type: 'CARD',
                            parameters: {
                                allowedAuthMethods: ['PAN_ONLY', 'CRYPTOGRAM_3DS'],
                                allowedCardNetworks: ['VISA', 'MASTERCARD', 'AMEX', 'DISCOVER']
                            },
                            tokenizationSpecification: {
                                type: 'PAYMENT_GATEWAY',
                                parameters: {
                                    'gateway': 'paypal',
                                    'gatewayMerchantId': clientId
                                }
                            }
                        }],
                        merchantInfo: config.merchantInfo || {
                            merchantId: clientId,
                            merchantName: 'Mecha Toys'
                        },
                        transactionInfo: {
                            currencyCode: 'EUR',
                            totalPriceStatus: 'FINAL',
                            totalPrice: productPrice.toFixed(2),
                            countryCode: 'ES'
                        },
                        callbackIntents: ['PAYMENT_AUTHORIZATION']
                    };
                    
                    console.log('PaymentDataRequest:', paymentDataRequest);
                    
                    // Check if the device/browser can make Google Pay payments
                    var paymentsClient = new google.payments.api.PaymentsClient({
                        environment: 'PRODUCTION'  // Change to 'TEST' for sandbox
                    });
                    
                    var isReadyToPayRequest = {
                        apiVersion: 2,
                        apiVersionMinor: 0,
                        allowedPaymentMethods: config.allowedPaymentMethods || [{
                            type: 'CARD',
                            parameters: {
                                allowedAuthMethods: ['PAN_ONLY', 'CRYPTOGRAM_3DS'],
                                allowedCardNetworks: ['VISA', 'MASTERCARD', 'AMEX', 'DISCOVER']
                            }
                        }]
                    };
                    
                    paymentsClient.isReadyToPay(isReadyToPayRequest)
                        .then(function(response) {
                            console.log('isReadyToPay response:', response);
                            
                            if (response.result) {
                                console.log('✅ Google Pay is ready!');
                                message.textContent = '';
                                
                                // Create Google Pay button
                                var button = paymentsClient.createButton({
                                    onClick: function() {
                                        console.log('🤖 Google Pay button clicked!');
                                        onGooglePayPaymentButtonClicked(paymentsClient, paymentDataRequest);
                                    },
                                    allowedPaymentMethods: config.allowedPaymentMethods || [{
                                        type: 'CARD',
                                        parameters: {
                                            allowedAuthMethods: ['PAN_ONLY', 'CRYPTOGRAM_3DS'],
                                            allowedCardNetworks: ['VISA', 'MASTERCARD', 'AMEX', 'DISCOVER']
                                        }
                                    }],
                                    buttonColor: 'black',
                                    buttonType: 'pay'
                                });
                                
                                button.style.width = '100%';
                                button.style.maxWidth = '400px';
                                button.style.height = '50px';
                                button.style.borderRadius = '12px';
                                
                                container.innerHTML = '';
                                container.appendChild(button);
                                
                            } else {
                                console.log('❌ Google Pay not ready on this device');
                                message.textContent = '🤖 Google Pay not available';
                            }
                        })
                        .catch(function(error) {
                            console.error('isReadyToPay error:', error);
                            message.textContent = '🤖 Google Pay not available';
                        });
                })
                .catch(function(error) {
                    console.error('Google Pay config error:', error);
                    message.textContent = '🤖 Google Pay error';
                });
        }

        // ============================================
        // GOOGLE PAY PAYMENT HANDLER
        // ============================================
        function onGooglePayPaymentButtonClicked(paymentsClient, paymentDataRequest) {
            console.log('=== GOOGLE PAY PAYMENT STARTED ===');
            
            var customerData = getCustomerData();
            if (!customerData) {
                alert('Please fill in your shipping details first.');
                return;
            }
            
            showLoading();
            
            // Load payment data (shows Google Pay sheet)
            paymentsClient.loadPaymentData(paymentDataRequest)
                .then(function(paymentData) {
                    console.log('Google Pay payment data received:', paymentData);
                    
                    // Create order in PayPal
                    return fetch('/create-google-pay-order', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            product_id: productId,
                            customer_name: customerData.name,
                            customer_email: customerData.email,
                            customer_phone: customerData.phone,
                            customer_address: customerData.address
                        })
                    })
                    .then(function(response) { return response.json(); })
                    .then(function(orderData) {
                        if (orderData.error) {
                            throw new Error(orderData.error);
                        }
                        
                        console.log('✅ Google Pay order created:', orderData.order_id);
                        
                        // Confirm order with PayPal
                        var googlepay = paypal.Googlepay();
                        
                        return googlepay.confirmOrder({
                            orderId: orderData.order_id,
                            paymentMethodData: paymentData.paymentMethodData
                        })
                        .then(function(confirmResult) {
                            console.log('Confirm result:', confirmResult);
                            
                            if (confirmResult.status === 'APPROVED') {
                                // Capture the payment
                                return fetch('/capture-google-pay-order', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ order_id: orderData.order_id })
                                })
                                .then(function(response) { return response.json(); })
                                .then(function(captureResult) {
                                    if (captureResult.success) {
                                        console.log('✅ Google Pay payment captured!');
                                        window.location.href = '/orders';
                                    } else {
                                        throw new Error(captureResult.error || 'Capture failed');
                                    }
                                });
                            } else if (confirmResult.status === 'PAYER_ACTION_REQUIRED') {
                                // Handle 3DS authentication
                                console.log('🔄 3DS authentication required...');
                                return googlepay.initiatePayerAction({ orderId: orderData.order_id })
                                    .then(function() {
                                        console.log('✅ 3DS authentication completed');
                                        // Capture after 3DS
                                        return fetch('/capture-google-pay-order', {
                                            method: 'POST',
                                            headers: { 'Content-Type': 'application/json' },
                                            body: JSON.stringify({ order_id: orderData.order_id })
                                        })
                                        .then(function(response) { return response.json(); })
                                        .then(function(captureResult) {
                                            if (captureResult.success) {
                                                console.log('✅ Google Pay payment captured after 3DS!');
                                                window.location.href = '/orders';
                                            } else {
                                                throw new Error(captureResult.error || 'Capture failed after 3DS');
                                            }
                                        });
                                    });
                            } else {
                                throw new Error('Order not approved: ' + confirmResult.status);
                            }
                        });
                    });
                })
                .catch(function(error) {
                    console.error('Google Pay error:', error);
                    alert('Error with Google Pay: ' + error.message);
                    hideLoading();
                });
        }

        // ============================================
        // RETRY GOOGLE PAY SETUP IF SDK NOT LOADED
        // ============================================
        var googlePayRetryCount = 0;
        var googlePayMaxRetries = 5;

        function retryGooglePay() {
            if (googlePayRetryCount >= googlePayMaxRetries) {
                console.log('❌ Google Pay SDK not loaded after ' + googlePayMaxRetries + ' retries');
                var container = document.getElementById('googlepay-container');
                var message = container.querySelector('.payment-message');
                message.textContent = '🤖 Google Pay not available';
                return;
            }
            
            googlePayRetryCount++;
            console.log('🔄 Retrying Google Pay setup (' + googlePayRetryCount + '/' + googlePayMaxRetries + ')...');
            
            setTimeout(function() {
                if (typeof google !== 'undefined' && typeof google.payments !== 'undefined') {
                    console.log('✅ Google Pay SDK loaded!');
                    setupGooglePay();
                } else {
                    retryGooglePay();
                }
            }, 1000);
        }

        // ============================================
        // INIT PAGE
        // ============================================
        function initPage() {
            console.log('=== PAGE LOADED ===');
            
            // Wait for SDKs to load
            setTimeout(function() {
                setupApplePay();
                
                // Check if Google Pay SDK is loaded
                if (typeof google !== 'undefined' && typeof google.payments !== 'undefined') {
                    setupGooglePay();
                } else {
                    retryGooglePay();
                }
            }, 2000);
        }

        if (document.readyState === 'complete') {
            initPage();
        } else {
            window.addEventListener('load', initPage);
        }

        // ============================================
        // FORM VALIDATION
        // ============================================
        var form = document.getElementById('checkout-form');
        if (form) {
            form.addEventListener('submit', function(e) {
                var btn = document.getElementById('paypal-btn');
                btn.disabled = true;
                btn.textContent = '⏳ Processing...';
            });
        }

        var inputs = document.querySelectorAll('#checkout-form input, #checkout-form textarea');
        for (var i = 0; i < inputs.length; i++) {
            inputs[i].addEventListener('blur', function() {
                if (this.hasAttribute('required') && !this.value.trim()) {
                    this.style.borderColor = '#e17055';
                } else {
                    this.style.borderColor = '#e9ecef';
                }
            });
        }
    </script>
</body>
</html>
