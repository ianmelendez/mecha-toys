<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - Mecha Toys</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    
    <!-- PayPal SDK - SOLO applepay -->
    <script src="https://www.paypal.com/sdk/js?client-id={{ client_id }}&currency=EUR&components=applepay&intent=capture">
    </script>
    
    <!-- Apple Pay JS SDK (NECESARIO) -->
    <script src="https://applepay.cdn-apple.com/jsapi/1.latest/apple-pay-sdk.js">
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .checkout-container {
            max-width: 650px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            padding: 40px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2rem; font-weight: 800; color: #1a1a2e; margin-bottom: 6px; }
        .header p { color: #636e72; font-size: 1rem; }

        .product-summary {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #e9ecef;
        }

        .product-summary .label { font-size: 0.85rem; color: #636e72; font-weight: 600; text-transform: uppercase; }
        .product-summary .name { font-size: 1.2rem; font-weight: 700; color: #1a1a2e; margin: 4px 0; }
        .product-summary .price { font-size: 1.8rem; font-weight: 800; color: #e17055; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; font-size: 0.9rem; color: #1a1a2e; margin-bottom: 6px; }
        .form-group label .required { color: #e17055; }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: white;
            color: #1a1a2e;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #6c5ce7;
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.1);
        }

        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        .payment-section {
            margin-top: 25px;
            border-top: 2px solid #e9ecef;
            padding-top: 25px;
        }

        .payment-section .label {
            font-size: 0.85rem;
            color: #636e72;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 15px;
            text-align: center;
        }

        .payment-buttons { display: flex; flex-direction: column; gap: 12px; }

        #applepay-container {
            width: 100%;
            min-height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #applepay-container apple-pay-button {
            width: 100%;
            max-width: 400px;
            height: 50px;
        }

        .paypal-btn-wrapper { margin-top: 10px; }

        .paypal-btn-wrapper .btn-paypal {
            width: 100%;
            padding: 16px;
            background: #0070ba;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 112, 186, 0.3);
        }

        .paypal-btn-wrapper .btn-paypal:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 112, 186, 0.4);
        }

        .paypal-btn-wrapper .btn-paypal:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .loading { display: none; text-align: center; padding: 20px; }
        .loading.active { display: block; }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0070ba;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .trust-badges {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .trust-badges span { font-size: 0.85rem; color: #636e72; font-weight: 500; }
        .back-link { display: block; text-align: center; margin-top: 16px; color: #636e72; text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: #1a1a2e; }

        .divider {
            display: flex;
            align-items: center;
            margin: 15px 0;
            color: #b2bec3;
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e9ecef;
        }

        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }

        #applepay-message {
            text-align: center;
            color: #b2bec3;
            font-size: 0.9rem;
            padding: 10px;
        }

        @media (max-width: 600px) {
            .checkout-container { padding: 24px; }
            .form-row { grid-template-columns: 1fr; gap: 0; }
            .header h1 { font-size: 1.6rem; }
            .product-summary .price { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="checkout-container">
        <div class="header">
            <h1>🛒 Checkout</h1>
            <p>Complete your purchase securely</p>
        </div>

        <div class="product-summary">
            <div class="label">Your Order</div>
            <div class="name">{{ product.name }}</div>
            <div class="price">€{{ "%.2f"|format(product.price) }}</div>
        </div>

        <form id="checkout-form" method="POST" action="/checkout/{{ product.id }}">
            <div class="form-group">
                <label for="name">Full Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" placeholder="John Doe" required />
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required />
                </div>
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone" placeholder="+34 600 000 000" />
                </div>
            </div>

            <div class="form-group">
                <label for="address">Shipping Address <span class="required">*</span></label>
                <textarea id="address" name="address" placeholder="Street, City, Postal Code, Country" required></textarea>
            </div>

            <div class="payment-section">
                <span class="label">💳 Payment Methods</span>
                
                <div class="payment-buttons">
                    <!-- APPLE PAY BUTTON - SEGÚN DOCUMENTACIÓN -->
                    <div id="applepay-container">
                        <div id="applepay-message">🍎 Checking Apple Pay availability...</div>
                    </div>

                    <div class="divider">or pay with PayPal</div>

                    <!-- PAYPAL STANDARD -->
                    <div class="paypal-btn-wrapper">
                        <button type="submit" class="btn-paypal" id="paypal-btn">
                            💳 Pay with PayPal
                        </button>
                    </div>
                </div>

                <div class="loading" id="loading-indicator">
                    <div class="spinner"></div>
                    <p style="color: #636e72;">Processing your payment...</p>
                </div>
            </div>
        </form>

        <div class="trust-badges">
            <span>🔒 Secure Payment</span>
            <span>🛡️ Buyer Protection</span>
            <span>📦 Fast Shipping</span>
        </div>

        <a href="/" class="back-link">← Back to Store</a>
    </div>

    <script>
        // ============================================
        // VARIABLES
        // ============================================
        var productId = "{{ product.id }}";
        var productName = "{{ product.name }}";
        var productPrice = parseFloat("{{ product.price }}");
        var clientId = "{{ client_id }}";

        console.log('=== APPLE PAY INTEGRATION ===');
        console.log('Product:', productName, '€' + productPrice);

        // ============================================
        // FUNCIONES DE CLIENTE
        // ============================================
        function getCustomerData() {
            var name = document.getElementById('name').value.trim();
            var email = document.getElementById('email').value.trim();
            var phone = document.getElementById('phone').value.trim();
            var address = document.getElementById('address').value.trim();
            
            if (!name || !email || !address) {
                alert('Please fill in all required fields.');
                return null;
            }
            
            return { name: name, email: email, phone: phone, address: address };
        }

        function showLoading() {
            document.getElementById('loading-indicator').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loading-indicator').classList.remove('active');
        }

        // ============================================
        // 1. CREAR PEDIDO EN PAYPAL (API)
        // ============================================
        async function createPayPalOrder() {
            var customerData = getCustomerData();
            if (!customerData) return null;
            
            try {
                showLoading();
                
                var response = await fetch('/create-apple-pay-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        product_id: productId,
                        customer_name: customerData.name,
                        customer_email: customerData.email,
                        customer_phone: customerData.phone,
                        customer_address: customerData.address
                    })
                });
                
                var data = await response.json();
                
                if (data.error) {
                    alert('Error creating order: ' + data.error);
                    hideLoading();
                    return null;
                }
                
                console.log('✅ Order created:', data.order_id);
                hideLoading();
                return data.order_id;
                
            } catch (error) {
                console.error('Error creating order:', error);
                alert('Error creating order. Please try again.');
                hideLoading();
                return null;
            }
        }

        // ============================================
        // 2. CAPTURAR PEDIDO EN PAYPAL (API)
        // ============================================
        async function capturePayPalOrder(orderId) {
            try {
                var response = await fetch('/capture-apple-pay-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order_id: orderId })
                });
                
                var data = await response.json();
                
                if (data.success) {
                    console.log('✅ Payment captured!');
                    window.location.href = '/orders';
                } else {
                    alert('Error processing payment: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error capturing order:', error);
                alert('Error processing payment. Please try again.');
            }
        }

        // ============================================
        // 3. CONFIGURAR APPLE PAY - SEGÚN DOCUMENTACIÓN
        // ============================================
        function setupApplePay() {
            var container = document.getElementById('applepay-container');
            var message = document.getElementById('applepay-message');
            
            console.log('=== SETUP APPLE PAY ===');
            
            // 1. Verificar que el SDK de PayPal está cargado
            if (typeof paypal === 'undefined') {
                console.error('❌ PayPal SDK not loaded');
                message.textContent = '❌ PayPal SDK not loaded';
                return;
            }
            console.log('✅ PayPal SDK loaded');

            // 2. Verificar que Apple Pay SDK está cargado
            if (typeof ApplePaySession === 'undefined') {
                console.error('❌ Apple Pay SDK not loaded');
                message.textContent = '❌ Apple Pay not supported in this browser';
                return;
            }
            console.log('✅ Apple Pay SDK loaded');

            // 3. Verificar si el dispositivo soporta Apple Pay
            if (!ApplePaySession.canMakePayments()) {
                console.error('❌ Device cannot make Apple Pay payments');
                message.textContent = '🍎 Apple Pay not available on this device (no card in Wallet)';
                return;
            }
            console.log('✅ Device can make Apple Pay payments');

            // 4. Crear instancia de Apple Pay y verificar elegibilidad
            console.log('Checking merchant eligibility...');
            var applepay = paypal.Applepay();
            
            applepay.config()
                .then(function(applepayConfig) {
                    console.log('Apple Pay config:', applepayConfig);
                    
                    if (applepayConfig.isEligible) {
                        console.log('✅ Merchant is eligible for Apple Pay!');
                        message.textContent = '';
                        
                        // Crear el botón de Apple Pay (HTML nativo de Apple)
                        var button = document.createElement('apple-pay-button');
                        button.setAttribute('buttonstyle', 'black');
                        button.setAttribute('type', 'buy');
                        button.setAttribute('locale', 'en');
                        button.style.width = '100%';
                        button.style.maxWidth = '400px';
                        button.style.height = '50px';
                        button.style.borderRadius = '12px';
                        
                        // Limpiar el contenedor y añadir el botón
                        container.innerHTML = '';
                        container.appendChild(button);
                        
                        // Evento click del botón
                        button.addEventListener('click', function() {
                            console.log('🍎 Apple Pay button clicked!');
                            startApplePaySession(applepayConfig);
                        });
                        
                    } else {
                        console.warn('⚠️ Merchant not eligible for Apple Pay');
                        message.textContent = '🍎 Apple Pay not available for this merchant';
                    }
                })
                .catch(function(error) {
                    console.error('❌ Error fetching Apple Pay config:', error);
                    message.textContent = '❌ Error checking Apple Pay availability';
                });
        }

        // ============================================
        // 4. INICIAR SESIÓN DE APPLE PAY
        // ============================================
        function startApplePaySession(applepayConfig) {
            console.log('=== START APPLE PAY SESSION ===');
            
            var customerData = getCustomerData();
            if (!customerData) return;
            
            // Crear el Payment Request para Apple Pay
            var paymentRequest = {
                countryCode: applepayConfig.countryCode || 'ES',
                merchantCapabilities: applepayConfig.merchantCapabilities || ['supports3DS'],
                supportedNetworks: applepayConfig.supportedNetworks || ['visa', 'mastercard', 'amex', 'discover'],
                currencyCode: 'EUR',
                requiredShippingContactFields: ['name', 'phone', 'email', 'postalAddress'],
                requiredBillingContactFields: ['postalAddress'],
                total: {
                    label: 'Mecha Toys - ' + productName,
                    type: 'final',
                    amount: productPrice.toFixed(2)
                }
            };
            
            console.log('Payment Request:', paymentRequest);
            
            // Crear la sesión de Apple Pay
            var session = new ApplePaySession(4, paymentRequest);
            
            // ============================================
            // 5. CALLBACK: onvalidatemerchant
            // ============================================
            session.onvalidatemerchant = function(event) {
                console.log('🔐 Validating merchant...');
                var applepay = paypal.Applepay();
                
                applepay.validateMerchant({
                    validationUrl: event.validationURL,
                    displayName: 'Mecha Toys'
                })
                .then(function(validateResult) {
                    console.log('✅ Merchant validated!');
                    session.completeMerchantValidation(validateResult.merchantSession);
                })
                .catch(function(validateError) {
                    console.error('❌ Merchant validation failed:', validateError);
                    session.abort();
                });
            };
            
            // ============================================
            // 6. CALLBACK: onpaymentauthorized
            // ============================================
            session.onpaymentauthorized = function(event) {
                console.log('💰 Payment authorized by user');
                console.log('Billing:', event.payment.billingContact);
                console.log('Shipping:', event.payment.shippingContact);
                
                // 1. Crear el pedido en PayPal (o usar uno existente)
                createPayPalOrder().then(function(orderId) {
                    if (!orderId) {
                        session.completePayment(ApplePaySession.STATUS_FAILURE);
                        return;
                    }
                    
                    // 2. Confirmar el pedido con el token de Apple Pay
                    var applepay = paypal.Applepay();
                    
                    applepay.confirmOrder({
                        orderId: orderId,
                        token: event.payment.token,
                        billingContact: event.payment.billingContact
                    })
                    .then(function(confirmResult) {
                        console.log('✅ Order confirmed with Apple Pay token:', confirmResult);
                        
                        // 3. Completar el pago en Apple Pay
                        session.completePayment(ApplePaySession.STATUS_SUCCESS);
                        
                        // 4. Capturar el pago en PayPal
                        capturePayPalOrder(orderId);
                    })
                    .catch(function(confirmError) {
                        console.error('❌ Order confirmation failed:', confirmError);
                        session.completePayment(ApplePaySession.STATUS_FAILURE);
                    });
                });
            };
            
            // ============================================
            // 7. INICIAR LA SESIÓN
            // ============================================
            session.begin();
            console.log('✅ Apple Pay session started!');
        }

        // ============================================
        // 8. INICIALIZAR CUANDO LA PÁGINA ESTÉ LISTA
        // ============================================
        function initPage() {
            console.log('=== PAGE LOADED ===');
            // Esperar a que el SDK de PayPal se cargue completamente
            setTimeout(setupApplePay, 2000);
        }

        if (document.readyState === 'complete') {
            initPage();
        } else {
            window.addEventListener('load', initPage);
        }

        // ============================================
        // 9. VALIDACIÓN DEL FORMULARIO PAYPAL
        // ============================================
        var form = document.getElementById('checkout-form');
        if (form) {
            form.addEventListener('submit', function(e) {
                var btn = document.getElementById('paypal-btn');
                btn.disabled = true;
                btn.textContent = '⏳ Processing...';
            });
        }

        var inputs = document.querySelectorAll('#checkout-form input, #checkout-form textarea');
        for (var i = 0; i < inputs.length; i++) {
            inputs[i].addEventListener('blur', function() {
                if (this.hasAttribute('required') && !this.value.trim()) {
                    this.style.borderColor = '#e17055';
                } else {
                    this.style.borderColor = '#e9ecef';
                }
            });
        }
    </script>
</body>
</html>
