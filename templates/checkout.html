<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - Mecha Toys</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .checkout-container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            padding: 40px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .header p {
            color: #636e72;
            font-size: 1rem;
        }

        .product-summary {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #e9ecef;
        }

        .product-summary .label {
            font-size: 0.85rem;
            color: #636e72;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product-summary .name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1a1a2e;
            margin: 4px 0;
        }

        .product-summary .price {
            font-size: 1.8rem;
            font-weight: 800;
            color: #e17055;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .form-group label .required {
            color: #e17055;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: white;
            color: #1a1a2e;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #6c5ce7;
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn-submit {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #0070ba, #003087);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 112, 186, 0.3);
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 112, 186, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .trust-badges {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .trust-badges span {
            font-size: 0.85rem;
            color: #636e72;
            font-weight: 500;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #636e72;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: #1a1a2e;
        }

        .payment-icons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 16px 0 8px;
            font-size: 1.8rem;
        }

        @media (max-width: 600px) {
            .checkout-container {
                padding: 24px;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .header h1 {
                font-size: 1.6rem;
            }

            .product-summary .price {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="checkout-container">
        <div class="header">
            <h1>🛒 Checkout</h1>
            <p>Complete your purchase securely</p>
        </div>

        <div class="product-summary">
            <div class="label">Your Order</div>
            <div class="name">{{ product.name }}</div>
            <div class="price">€{{ "%.2f"|format(product.price) }}</div>
        </div>

        <form action="/checkout/{{ product.id }}" method="POST" id="checkout-form">
            <div class="form-group">
                <label for="name">Full Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" placeholder="John Doe" required />
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required />
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="+1234567890" />
                </div>
            </div>

            <div class="form-group">
                <label for="address">Shipping Address <span class="required">*</span></label>
                <textarea id="address" name="address" placeholder="Street, City, Postal Code, Country" required></textarea>
            </div>

            <div class="payment-icons">
                <span>💳</span>
                <span>🅿️</span>
                <span>🔒</span>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">
                💳 Proceed to PayPal
            </button>
        </form>

        <div class="trust-badges">
            <span>🔒 Secure Payment</span>
            <span>🛡️ Buyer Protection</span>
            <span>📦 Fast Shipping</span>
        </div>

        <a href="/" class="back-link">← Back to Store</a>
    </div>

    <script>
        document.getElementById('checkout-form').addEventListener('submit', function(e) {
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = '⏳ Redirecting to PayPal...';
        });
    </script>
</body>
</html>
